substitutions:
  _SERVICE: hkcampus-ocr
  _REGION: asia-east1
  _MEMORY: 1Gi
  _CPU: "1"
  _MAX_INSTANCES: "3"
  _MIN_INSTANCES: "0"
  _TIMEOUT: "60"
  _CONCURRENCY: "1"
  _OCR_TEXT_ENGINE: ocr_space
  _OCR_SPACE_API_URL: https://api.ocr.space/parse/image
  _OCR_SPACE_API_KEY_SECRET: OCR_SPACE_API_KEY
  _OCR_SPACE_API_KEY_VERSION: latest
  _OCR_SPACE_LANGUAGE: eng
  _OCR_SPACE_ENGINE: "2"
  _OCR_SPACE_TIMEOUT: "30"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/hkcampus-ocr/${_SERVICE}:$COMMIT_SHA
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/hkcampus-ocr/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-east1-docker.pkg.dev/$PROJECT_ID/hkcampus-ocr/${_SERVICE}:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-east1-docker.pkg.dev/$PROJECT_ID/hkcampus-ocr/${_SERVICE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - asia-east1-docker.pkg.dev/$PROJECT_ID/hkcampus-ocr/${_SERVICE}:$COMMIT_SHA
      - --platform
      - managed
      - --region
      - ${_REGION}
      - --allow-unauthenticated
      - --cpu
      - ${_CPU}
      - --memory
      - ${_MEMORY}
      - --concurrency
      - ${_CONCURRENCY}
      - --timeout
      - ${_TIMEOUT}
      - --min-instances
      - ${_MIN_INSTANCES}
      - --max-instances
      - ${_MAX_INSTANCES}
      - --set-env-vars
      - OCR_RUNTIME_HOME=/tmp/hkcampus-ocr,OCR_TEXT_ENGINE=${_OCR_TEXT_ENGINE},OCR_SPACE_API_URL=${_OCR_SPACE_API_URL},OCR_SPACE_LANGUAGE=${_OCR_SPACE_LANGUAGE},OCR_SPACE_ENGINE=${_OCR_SPACE_ENGINE},OCR_SPACE_TIMEOUT=${_OCR_SPACE_TIMEOUT}
      - --update-secrets
      - OCR_SPACE_API_KEY=${_OCR_SPACE_API_KEY_SECRET}:${_OCR_SPACE_API_KEY_VERSION}

images:
  - asia-east1-docker.pkg.dev/$PROJECT_ID/hkcampus-ocr/${_SERVICE}:$COMMIT_SHA
  - asia-east1-docker.pkg.dev/$PROJECT_ID/hkcampus-ocr/${_SERVICE}:latest
