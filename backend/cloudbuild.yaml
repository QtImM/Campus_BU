substitutions:
  _SERVICE: hkcampus-ocr
  _REGION: asia-east1
  _MEMORY: 1Gi
  _CPU: "1"
  _MAX_INSTANCES: "3"
  _MIN_INSTANCES: "0"
  _TIMEOUT: "60"
  _CONCURRENCY: "1"
  _OCR_TEXT_ENGINE: paddle

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - .

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA
      - --platform
      - managed
      - --region
      - ${_REGION}
      - --allow-unauthenticated
      - --cpu
      - ${_CPU}
      - --memory
      - ${_MEMORY}
      - --concurrency
      - ${_CONCURRENCY}
      - --timeout
      - ${_TIMEOUT}
      - --min-instances
      - ${_MIN_INSTANCES}
      - --max-instances
      - ${_MAX_INSTANCES}
      - --set-env-vars
      - OCR_RUNTIME_HOME=/tmp/hkcampus-ocr,OCR_TEXT_ENGINE=${_OCR_TEXT_ENGINE}

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest
